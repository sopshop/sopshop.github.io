openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sop Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: listings
    description: Marketplace listings
  - name: sellers
    description: Seller operations
  - name: users
    description: User operations
  - name: checkout
    description: Stripe checkout

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Listings ──────────────────────────────────────────────────────────────
  /listings:
    get:
      operationId: listListings
      tags: [listings]
      summary: List all listings with optional filters
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: keyword
          in: query
          schema: { type: string }
        - name: priceMin
          in: query
          schema: { type: number }
        - name: priceMax
          in: query
          schema: { type: number }
        - name: sellerId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [available, sold] }
        - name: limit
          in: query
          schema: { type: integer, default: 40 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing (authenticated sellers only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "401":
          description: Unauthorized

  /listings/featured:
    get:
      operationId: listFeaturedListings
      tags: [listings]
      summary: Get featured/recent listings grouped by category for the home page carousel
      responses:
        "200":
          description: Featured listings by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRow"

  /listings/categories:
    get:
      operationId: listCategories
      tags: [listings]
      summary: Get all categories with listing counts
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a single listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "404":
          description: Not found
    patch:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing (authenticated seller only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingUpdate"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Delete / deactivate a listing (authenticated seller only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  # ── Sellers ────────────────────────────────────────────────────────────────
  /sellers/{id}:
    get:
      operationId: getSeller
      tags: [sellers]
      summary: Get a seller's public profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerProfile"
        "404":
          description: Not found

  /sellers/{id}/listings:
    get:
      operationId: getSellerListings
      tags: [sellers]
      summary: Get all active listings for a seller (public storefront)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Seller listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  # ── User / Profile ─────────────────────────────────────────────────────────
  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: JIT-provision the authenticated Clerk user into the local DB
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get the current authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /users/me/listings:
    get:
      operationId: getMyListings
      tags: [users]
      summary: Get all listings for the currently authenticated seller
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
        "401":
          description: Unauthorized

  /users/me/orders:
    get:
      operationId: getMyOrders
      tags: [users]
      summary: Get all orders placed by the current user
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized

  /users/me/sales:
    get:
      operationId: getMySales
      tags: [users]
      summary: Get all completed sales for the current seller (seller dashboard)
      responses:
        "200":
          description: Sales list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized

  # ── Checkout ───────────────────────────────────────────────────────────────
  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create a Stripe Checkout session to buy a listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Stripe checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "401":
          description: Unauthorized
        "404":
          description: Listing not found

  /checkout/success:
    get:
      operationId: checkoutSuccess
      tags: [checkout]
      summary: Handle post-checkout success; mark listing as sold
      parameters:
        - name: session_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

# ── Schemas ─────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Listing:
      type: object
      required: [id, title, price, category, status, sellerId, sellerName, images, createdAt]
      properties:
        id:          { type: string }
        title:       { type: string }
        description: { type: ["string", "null"] }
        price:       { type: number }
        category:    { type: string }
        status:      { type: string, enum: [available, sold] }
        sellerId:    { type: string }
        sellerName:  { type: string }
        sellerAvatar: { type: ["string", "null"] }
        images:
          type: array
          items: { type: string }
        createdAt:   { type: string }

    ListingDetail:
      type: object
      required: [id, title, price, category, status, sellerId, sellerName, images, createdAt, seller]
      properties:
        id:          { type: string }
        title:       { type: string }
        description: { type: ["string", "null"] }
        price:       { type: number }
        category:    { type: string }
        status:      { type: string, enum: [available, sold] }
        sellerId:    { type: string }
        sellerName:  { type: string }
        sellerAvatar: { type: ["string", "null"] }
        images:
          type: array
          items: { type: string }
        createdAt:   { type: string }
        seller:      { $ref: "#/components/schemas/SellerProfile" }

    ListingInput:
      type: object
      required: [title, price, category, images]
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        price:       { type: number, minimum: 0.01 }
        category:    { type: string, minLength: 1 }
        images:
          type: array
          items: { type: string }
          minItems: 1

    ListingUpdate:
      type: object
      properties:
        title:       { type: string, minLength: 1 }
        description: { type: string }
        price:       { type: number, minimum: 0.01 }
        category:    { type: string }
        status:      { type: string, enum: [available, sold] }
        images:
          type: array
          items: { type: string }

    CategoryRow:
      type: object
      required: [category, listings]
      properties:
        category: { type: string }
        listings:
          type: array
          items: { $ref: "#/components/schemas/Listing" }

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category: { type: string }
        count:    { type: integer }

    SellerProfile:
      type: object
      required: [id, name, createdAt, totalListings]
      properties:
        id:           { type: string }
        name:         { type: string }
        email:        { type: ["string", "null"] }
        avatarUrl:    { type: ["string", "null"] }
        bio:          { type: ["string", "null"] }
        createdAt:    { type: string }
        totalListings: { type: integer }
        totalSales:   { type: integer }

    UserProfile:
      type: object
      required: [id, name, createdAt]
      properties:
        id:        { type: string }
        name:      { type: string }
        email:     { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        bio:       { type: ["string", "null"] }
        createdAt: { type: string }

    UserProfileUpdate:
      type: object
      properties:
        name:      { type: string, minLength: 1 }
        bio:       { type: string }
        avatarUrl: { type: string }

    Order:
      type: object
      required: [id, listingId, listingTitle, buyerId, amount, status, createdAt]
      properties:
        id:              { type: string }
        listingId:       { type: string }
        listingTitle:    { type: string }
        listingImage:    { type: ["string", "null"] }
        buyerId:         { type: string }
        sellerId:        { type: string }
        amount:          { type: number }
        status:          { type: string, enum: [pending, completed, cancelled] }
        stripeSessionId: { type: ["string", "null"] }
        createdAt:       { type: string }

    CheckoutInput:
      type: object
      required: [listingId]
      properties:
        listingId: { type: string }

    CheckoutResult:
      type: object
      required: [url]
      properties:
        url: { type: string }
